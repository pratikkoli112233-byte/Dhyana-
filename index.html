  .sheet-title { font-size: 19px; font-weight:600; font-family:'Fraunces',serif; }

  .ring { position:absolute; border-radius:50%; border: 1px solid; opacity:0.5; }

  .orb { border-radius: 999px; display:flex; align-items:center; justify-content:center; text-align:center; transition: transform 0.5s ease; }

  .article-title { font-family:'Fraunces',serif; font-size:19px; font-weight:600; margin-bottom:8px; }
  .article-body { font-size: 13.5px; line-height:1.65; color:#CBD3D2; }

  .chat-ai { background: rgba(140,127,179,0.12); border:1px solid rgba(140,127,179,0.3); }

const ARTICLES = [
  { id:"present", title:"On the Present Moment", body:"Much of our unease doesn't come from what's actually happening, but from the mind's habit of living in the last five minutes or the next fifty. Contemplative traditions across cultures converge on a simple observation: the present moment is the only place where anything can actually be experienced or changed. Worry rehearses a future that hasn't arrived; regret replays a past that's already gone. Neither exists anywhere except in thought. This doesn't mean planning or reflecting are useless — it means noticing when the mind has quietly left the room you're actually sitting in. Meditation practice is, in large part, repeated training in noticing that departure and returning, gently, again and again.",

  { id:"stoic", title:"Stoic Acceptance and the Breath", body:"The Stoic philosophers drew a sharp line between what is within our control and what isn't — our judgments and responses versus outcomes, other people, and the past. Nowhere is this line clearer than in the breath. You cannot control how the day will go, but for the length of one inhale, you can control exactly this: how fully you let the air in. Many breathing practices work not because the breath is mystical, but because it's one of the few processes that is both automatic and adjustable — a live demonstration that calm is available as a choice in this moment, even when the larger situation is not.",

let audioCtx = null;
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function chime(freq=520) {
  try {
    const ctx = getCtx();
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.type = "sine"; osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.14, ctx.currentTime+0.05);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+1.2);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime+1.3);
  } catch(e){}
}
function speak(word) {
  try {
    if (!window.speechSynthesis) { chime(500); return; }
    const u = new SpeechSynthesisUtterance(word);
    u.lang = state.lang === 'mr' ? 'mr-IN' : state.lang === 'hi' ? 'hi-IN' : 'en-US';
    u.rate = 0.85; u.volume = 0.9;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
  } catch(e) { chime(500); }
}

class AmbientEngine {
  constructor(sound) { this.sound = sound; this.nodes = []; this.playing = false; }
  start() {
    const ctx = getCtx();
    this.playing = true;
    const master = ctx.createGain(); master.gain.value = 0.16;
    master.connect(ctx.destination); this.master = master;
    if (this.sound.type.startsWith("noise")) {
      const bufferSize = 2 * ctx.sampleRate;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i=0;i<bufferSize;i++) data[i] = Math.random()*2-1;
      const noise = ctx.createBufferSource(); noise.buffer = buffer; noise.loop = true;
      const filter = ctx.createBiquadFilter(); filter.type = "lowpass"; filter.frequency.value = this.sound.freq;
      noise.connect(filter); filter.connect(master); noise.start();
      this.nodes.push(noise);
      if (this.sound.type === "noise-wave") {
        const lfo = ctx.createOscillator(); lfo.frequency.value = 0.12;
        const lfoGain = ctx.createGain(); lfoGain.gain.value = 0.08;
        lfo.connect(lfoGain); lfoGain.connect(master.gain); lfo.start();
        this.nodes.push(lfo);
      }
    } else if (this.sound.type === "drone" || this.sound.type === "harmonic") {
      const partials = this.sound.type === "drone" ? [1,2,3] : [1,1.5,2,2.6];
      partials.forEach((p,i) => {
        const osc = ctx.createOscillator(); osc.type="sine"; osc.frequency.value = this.sound.freq*p;
        const g = ctx.createGain(); g.gain.value = 0.5/(i+1.5);
        osc.connect(g); g.connect(master); osc.start();
        this.nodes.push(osc);
      });
    }
  }
  stop() {
    this.playing = false;
    this.nodes.forEach(n => { try{n.stop();}catch(e){} try{n.disconnect();}catch(e){} });
    if (this.master) try{this.master.disconnect();}catch(e){}
    this.nodes = [];
  }
}

async function askGemini(prompt) {
  if (!state.geminiKey) return null;
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${state.geminiKey}`, {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ contents:[{ parts:[{ text: prompt }] }] })
    });
    const data = await res.json();
    const text = data?.candidates?.[0]?.content?.parts?.map(p=>p.text).join(" ");
    return text || "…";
  } catch(e) { return null; }
}

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function todayKey(ts=Date.now()){ const d=new Date(ts); return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; }
function computeStreak(sessions) {
  if (!sessions.length) return 0;
  const days = new Set(sessions.map(s=>todayKey(s.ts)));
  let streak=0, cursor=Date.now();
  while (days.has(todayKey(cursor))) { streak++; cursor -= 86400000; }
  return streak;
}

let sessionTimer = null;
let breathRaf = null;
function renderSession() {
  const p = state.pendingStart;
  const tc = findTechnique(p.techniqueId);
  const c = CATEGORY_COLOR[tc.category];
  const isBreathType = tc.category === 'breath';

  mount(`
    <div class="header">
      <div></div>
      <div class="mono" style="font-size:11px;color:var(--muted2);">${tc.name}</div>
    </div>
    <div class="orb-wrap" style="height:56vh;">
      <div class="orb" id="session-orb" style="width:200px;height:200px;background:radial-gradient(circle at 35% 30%, ${c}55, ${c}22 60%, transparent 75%);border:1px solid ${c}88;">
        <div id="orb-content" style="text-align:center;">
          <div class="fraunces" id="orb-time" style="font-size:30px;">--:--</div>
          <div class="mono" id="orb-phase" style="font-size:11px;color:${c};margin-top:4px;">${t('startSession')}…</div>
        </div>
      </div>
      <div class="mono" style="font-size:12px;color:var(--muted2);margin-top:24px;" id="session-remaining"></div>
    </div>
    <div class="section" style="display:flex;justify-content:center;">
      <button class="btn-ghost" id="end-session-btn">${t('endEarly')}</button>
    </div>
  `);

  const totalMs = p.durationMin * 60 * 1000;
  const startTs = Date.now();
  if (p.soundId) {
    const sound = allSounds().find(s=>s.id===p.soundId);
    if (sound) { stopAmbient(); if (sound.dataUrl) { customAudioEl = new Audio(sound.dataUrl); customAudioEl.loop = true; customAudioEl.volume=0.5; customAudioEl.play().catch(()=>{}); } else { currentAmbient = new AmbientEngine(sound); currentAmbient.start(); } }
  }

  const pattern = { inhale:4, hold1:4, exhale:4, hold2:4 };
  const phaseOrder = ['inhale','hold1','exhale','hold2'];
  let phaseIdx = 0; let phaseStart = performance.now();

  function updateBreathPhase(now) {
    if (!isBreathType) return;
    const phase = phaseOrder[phaseIdx];
    const dur = pattern[phase]*1000;
    const elapsed = now - phaseStart;
    if (elapsed >= dur) {
      phaseIdx = (phaseIdx+1) % phaseOrder.length;
      phaseStart = now;
      const word = PHASE_WORD[phaseOrder[phaseIdx]];
      speak(word[state.lang] || word.en);
    }
    const phaseNow = phaseOrder[phaseIdx];
    const scale = phaseNow==='inhale' ? 0.6+0.4*(elapsed/dur) : phaseNow==='exhale' ? 1-0.4*(elapsed/dur) : phaseNow==='hold1' ? 1 : 0.6;
    const orb = document.getElementById('session-orb');
    if (orb) orb.style.transform = `scale(${scale})`;
    const label = document.getElementById('orb-phase');
    if (label) label.textContent = (PHASE_WORD[phaseNow][state.lang]||PHASE_WORD[phaseNow].en);
  }

  function tick() {
    const now = Date.now();
    const elapsed = now - startTs;
    const remaining = Math.max(0, totalMs - elapsed);
    const mm = Math.floor(remaining/60000); const ss = Math.floor((remaining%60000)/1000);
    const timeEl = document.getElementById('orb-time');
    if (timeEl) timeEl.textContent = `${mm}:${ss.toString().padStart(2,'0')}`;
    const remEl = document.getElementById('session-remaining');
    if (remEl) remEl.textContent = `${Math.ceil(remaining/60000)} ${t('minutes')} remaining`;
    updateBreathPhase(performance.now());
    if (remaining <= 0) { finishSession(tc, p); return; }
    breathRaf = requestAnimationFrame(tick);
  }
  if (isBreathType) speak(PHASE_WORD.inhale[state.lang]||PHASE_WORD.inhale.en);
  breathRaf = requestAnimationFrame(tick);

  document.getElementById('end-session-btn').onclick = () => { cancelAnimationFrame(breathRaf); finishSession(tc, p, true); };
}

function finishSession(tc, p, early) {
  cancelAnimationFrame(breathRaf);
  const session = { id: uid(), ts: Date.now(), techniqueId: tc.id, durationSec: p.durationMin*60 };
  state.sessions = [session, ...state.sessions];
  saveState();
  chime(660);
  const keepSound = currentAmbient || customAudioEl;
  const overlay = el(`<div class="sheet-overlay"><div class="sheet">
    <div class="sheet-header"><div class="sheet-title">🪷 ${t('sessionDone')}</div></div>
    ${keepSound ? `<div class="card" style="display:flex;align-items:center;justify-content:space-between;">
      <div style="font-size:13.5px;">${t('stayCalm')}</div>
      <button class="btn-ghost" id="continue-sound-btn" style="padding:9px 16px;font-size:12px;">${t('continueSound')}</button>
    </div>` : ''}
    <button class="btn-primary btn-block" id="finish-done-btn" style="margin-top:14px;">${t('done')}</button>
  </div></div>`);
  document.body.appendChild(overlay);
  if (keepSound) overlay.querySelector('#continue-sound-btn').onclick = () => { overlay.remove(); };
  overlay.querySelector('#finish-done-btn').onclick = () => {
    stopAmbient(); if (customAudioEl) { customAudioEl.pause(); customAudioEl=null; }
    overlay.remove(); state.screen='home'; render();
  };
}

function showAssistantSheet(initialQuestion) {
  const overlay = el(`<div class="sheet-overlay"><div class="sheet" style="min-height:50vh;display:flex;flex-direction:column;">
    <div class="sheet-header"><div class="sheet-title" style="display:flex;align-items:center;gap:8px;">${assistantIcon(20,'#8C7FB3')} Assistant</div><button id="close-ai">${svgX()}</button></div>
    <div id="chat-log" style="flex:1;overflow-y:auto;margin-bottom:12px;"></div>
    ${!state.geminiKey ? `<div class="disclaimer-box">${t('aiUnavailable')}</div>` : `
    <div style="display:flex;gap:8px;">
      <input class="input-basic" id="chat-input" style="margin-bottom:0;" placeholder="${t('typeQuestion')}" />
      <button class="btn-primary" id="chat-send" style="padding:12px 18px;">${t('send')}</button>
    </div>`}
  </div></div>`);
  document.body.appendChild(overlay);
  overlay.querySelector('#close-ai').onclick = () => overlay.remove();
  const log = overlay.querySelector('#chat-log');
  function addMsg(text, who) { const m = el(`<div class="chat-msg chat-${who}">${text}</div>`); log.appendChild(m); log.scrollTop = log.scrollHeight; }
  async function send(q) {
    addMsg(q, 'user');
    const thinking = el(`<div class="chat-msg chat-ai mono">${t('thinking')}</div>`); log.appendChild(thinking); log.scrollTop = log.scrollHeight;
    const answer = await askGemini(q + " (Answer in 3-4 concise sentences.)");
    thinking.remove();
    addMsg(answer || "…", 'ai');
  }
  if (state.geminiKey) {
    overlay.querySelector('#chat-send').onclick = () => {
      const input = overlay.querySelector('#chat-input');
      const q = input.value.trim(); if (!q) return; input.value=''; send(q);
    };
  }
  if (initialQuestion) { if (state.geminiKey) send(initialQuestion); else addMsg(initialQuestion, 'user'); }
}

loadState();
